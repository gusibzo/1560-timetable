<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#171a1f">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>1560 여름 시간표</title>
<style>
:root{--bg:#b4bac3;--panel:#d6dbe1;--dark:#171a1f;--red:#e23b2e;--green:#177226;--blue:#1e63d6;--line:#bcc3cb;font-family:-apple-system,BlinkMacSystemFont,"Noto Sans KR",sans-serif}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:#111;padding:14px 10px 80px}.wrap{max-width:470px;margin:auto}.head{background:var(--dark);color:#fff;border-radius:19px;padding:18px}.route{display:flex;justify-content:space-between;align-items:flex-start}.route strong{font:900 45px monospace;color:var(--red)}.route em{font-style:normal;color:#ffd46b;font-size:20px}.rev{text-align:right;color:#aaa;font-weight:800}.clock{border-top:1px solid #333;margin-top:12px;padding-top:12px;display:flex;justify-content:space-between}.links,.tabs,.summary{display:grid;gap:8px;margin-top:12px}.links{grid-template-columns:repeat(3,1fr)}.links a,.tabs button,.summary div{border:0;border-radius:12px;background:var(--panel);padding:12px;text-align:center;text-decoration:none;color:#111;font-weight:900}.tabs{grid-template-columns:repeat(3,1fr)}.tabs button.active{background:var(--green);color:#fff}.summary{grid-template-columns:repeat(3,1fr)}.summary b{display:block;font-size:20px;margin-top:4px}.notice{margin-top:11px;background:var(--panel);border-left:4px solid var(--red);border-radius:12px;padding:12px;display:flex;justify-content:space-between;font-weight:900}.notice span:last-child{color:var(--red)}.board{margin-top:11px;background:var(--panel);border-radius:17px;overflow:auto}table{width:100%;border-collapse:collapse;table-layout:fixed}th{background:var(--green);color:#fff;padding:11px 1px}td{text-align:center;padding:14px 1px;border-top:1px solid var(--line);font-weight:900;color:var(--green)}td:nth-child(2),td:nth-child(3){background:#ffe985}.no{width:15%;color:#111}.edge{color:var(--red)!important}.ext{display:block;font-size:10px;color:#965600;margin-top:4px}.tools{position:fixed;right:10px;bottom:18px;display:flex;flex-direction:column;gap:12px}.tools button{width:48px;height:48px;border-radius:50%;border:0;background:#565b62;color:#fff;font-size:23px;box-shadow:0 5px 16px #0006}.modal{display:none;position:fixed;inset:0;background:#0009;z-index:10;align-items:center;justify-content:center;padding:18px}.modal.open{display:flex}.card{width:min(390px,100%);background:#11141c;color:#fff;border-radius:22px;padding:18px}.cardhead{display:flex;justify-content:space-between;align-items:center}.cardhead h2{margin:0}.close{border:0;border-radius:50%;width:38px;height:38px;font-size:22px}.coords{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:15px}.coord{background:#252832;border-radius:14px;text-align:center;padding:18px}.coord b{font-size:29px}.coord span{display:block;color:#bbb;margin-top:5px}.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}.actions button,.actions a{border:0;border-radius:13px;padding:15px 8px;text-align:center;font-weight:900;text-decoration:none;color:#111}.loc{background:#79ff3b}.naver{background:#1ec800;color:#fff!important}.kakao{background:#fae100}.msg{margin-top:13px;background:#252832;border-radius:12px;padding:12px;color:#ddd;line-height:1.5}.foot{text-align:center;color:#666;font-size:11px;margin-top:14px}@media(max-width:360px){td{font-size:13px;padding:12px 0}.route strong{font-size:38px}}
</style>
</head>
<body>
<main class="wrap">
<section class="head"><div class="route"><div><strong>1560</strong> <em>여름</em><div style="margin-top:8px">🚌 경기버스</div></div><div class="rev">Rev.15 · APP<br><span id="date"></span></div></div><div class="clock"><span>● 오늘</span><b id="clock">--:--:--</b></div></section>
<div class="links"><a href="https://www.weather.go.kr/w/index.do">🌤️ 날씨</a><a href="https://finance.daum.net/">📈 금융</a><a href="https://www.roadplus.co.kr/main">🛣️ 교통</a></div>
<div class="tabs"><button data-day="weekday">평일</button><button data-day="saturday">토요일</button><button data-day="sunday">일요일</button></div>
<div class="summary"><div>첫차<b id="first"></b></div><div>막차<b id="last"></b></div><div>운행대수<b id="count"></b></div></div>
<div class="notice"><span>검차</span><span>월요일</span></div>
<section class="board"><table><thead><tr><th>순번</th><th>1회</th><th>2회</th><th>3회</th><th>4회</th><th>5회</th></tr></thead><tbody id="rows"></tbody></table></section>
<div class="foot">HTTPS 앱 주소에서 위치 권한과 홈 화면 추가 기능이 작동합니다.</div>
</main>
<div class="tools"><button id="gpsBtn">🧭</button></div>
<div class="modal" id="modal"><div class="card"><div class="cardhead"><div><h2>지도 · 속도계</h2><div style="color:#bbb;margin-top:5px">현재 위치 좌표와 지도 바로가기</div></div><button class="close" id="close">×</button></div><div class="coords"><div class="coord"><b id="lat">--.--</b><span>위도</span></div><div class="coord"><b id="lon">--.--</b><span>경도</span></div></div><div class="actions"><button class="loc" id="locate">📍 현재 위치</button><a class="naver" href="https://m.map.naver.com/">🗺️ 네이버지도</a><a class="kakao" href="https://m.map.kakao.com/">🧭 카카오맵</a><a class="naver" id="myMap" href="https://m.map.naver.com/">🚏 좌표 지도 열기</a></div><div class="msg" id="msg">현재 위치 버튼을 누른 뒤 위치 사용을 허용해 주세요.</div></div></div>
<script>
const D={weekday:{n:13,c:'#177226',r:[['5:00','8:00','11:50','16:10','20:00'],['5:15','8:20','12:15','16:30','20:15'],['5:30','8:40','12:35','16:45','20:30'],['5:45','9:00','13:00','17:00','20:45'],['6:00','9:20','13:25','17:15','21:00'],['6:20','9:40','13:50','17:30','21:15'],['6:25','10:00','14:10','17:45','21:30'],['6:30','10:15','14:30','18:00','21:45'],['6:40','10:30','14:50','18:20','22:00|23:10'],['6:50','10:45','15:05','18:40','22:15|23:30'],['7:00','11:00','15:20','19:00','22:30|23:50'],['7:20','11:15','15:35','19:20',''],['7:40','11:30','15:50','19:40','']]},saturday:{n:9,c:'#1e63d6',r:[['5:00','8:00','11:50','15:55','19:40'],['5:20','8:25','12:20','16:20','20:05'],['5:40','8:50','12:50','16:45','20:30'],['6:00','9:15','13:20','17:10','20:55'],['6:20','9:40','13:50','17:35','21:20'],['6:40','10:05','14:15','18:00','21:45|22:55'],['7:00','10:30','14:40','18:25','22:10|23:20'],['7:20','10:55','15:05','18:50','22:30|23:50'],['7:40','11:20','15:30','19:15','']]},sunday:{n:8,c:'#e23b2e',r:[['5:00','8:10','12:00','15:55','19:40'],['5:25','8:40','12:30','16:20','20:10'],['5:50','9:10','13:00','16:45','20:40'],['6:15','9:40','13:30','17:10','21:10'],['6:40','10:10','14:00','17:40','21:40|22:55'],['7:05','10:40','14:30','18:10','22:05|23:20'],['7:30','11:05','15:00','18:40','22:30|23:50'],['7:50','11:30','15:30','19:10','']]}};
let day=new Date().getDay()===0?'sunday':new Date().getDay()===6?'saturday':'weekday';
function mins(s){let [h,m]=s.split(':').map(Number);return h*60+m}function fmt(m){return String(Math.floor(m/60)).padStart(2,'0')+':'+String(m%60).padStart(2,'0')}
function render(){let x=D[day],all=[];document.documentElement.style.setProperty('--green',x.c);document.querySelectorAll('.tabs button').forEach(b=>b.classList.toggle('active',b.dataset.day===day));rows.innerHTML='';x.r.forEach((a,i)=>{let tr=document.createElement('tr');tr.innerHTML='<td class="no">'+(i+1)+'</td>';a.forEach((v,j)=>{let td=document.createElement('td');if(v){let [t,e]=v.split('|');all.push(mins(t));td.textContent=t;if(e){all.push(mins(e));td.innerHTML=t+'<span class="ext">+강남역 <b>'+e+'</b></span>'}}if((i===0&&(j===0||j===2))||(j===4&&i===x.r.length-2))td.classList.add('edge');tr.appendChild(td)});rows.appendChild(tr)});first.textContent=fmt(Math.min(...all));last.textContent=fmt(Math.max(...all));count.textContent=x.n+'대'}
document.querySelectorAll('.tabs button').forEach(b=>b.onclick=()=>{day=b.dataset.day;render()});function tick(){let d=new Date(),p=n=>String(n).padStart(2,'0');clock.textContent=p(d.getHours())+':'+p(d.getMinutes())+':'+p(d.getSeconds());date.textContent=d.getFullYear()+'.'+p(d.getMonth()+1)+'.'+p(d.getDate())}setInterval(tick,1000);tick();render();
const modal=document.getElementById('modal');gpsBtn.onclick=()=>modal.classList.add('open');close.onclick=()=>modal.classList.remove('open');modal.onclick=e=>{if(e.target===modal)modal.classList.remove('open')};locate.onclick=()=>{if(!navigator.geolocation){msg.textContent='이 브라우저는 위치 기능을 지원하지 않습니다.';return}msg.textContent='현재 위치를 확인하는 중입니다...';navigator.geolocation.getCurrentPosition(p=>{let a=p.coords.latitude,o=p.coords.longitude;lat.textContent=a.toFixed(3);lon.textContent=o.toFixed(3);myMap.href='https://map.naver.com/p/search/'+a+','+o;msg.textContent='위치를 불러왔습니다. 정확도 약 '+Math.round(p.coords.accuracy)+'m';},e=>{msg.textContent=e.code===1?'위치 권한이 거부되었습니다. Chrome의 위치 권한을 허용해 주세요.':'위치를 불러오지 못했습니다.'},{enableHighAccuracy:true,timeout:10000})};
</script>
</body></html>
